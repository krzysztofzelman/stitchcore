name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mercha_test
          POSTGRES_USER: mercha
          POSTGRES_PASSWORD: mercha123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Check imports and syntax
        run: python -c "import ast; ast.parse(open('app/main.py').read())"

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql+asyncpg://mercha:mercha123@localhost:5432/mercha_test
          SECRET_KEY=test-secret-key-for-ci-2026
          DEBUG=false
          EOF
          echo "Created .env:"
          cat .env

      - name: Start backend server
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          # Poll / endpoint until ready (up to 30s)
          for i in $(seq 1 30); do
            RESP=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ 2>/dev/null || echo "000")
            if [ "$RESP" = "200" ]; then
              echo "Server is ready after ${i}s (HTTP 200)"
              break
            fi
            echo "Attempt $i: HTTP $RESP — waiting..."
            if [ "$i" -eq 30 ]; then
              echo "=== Server failed to start after 30s ==="
              echo "--- uvicorn log (/tmp/uvicorn.log) ---"
              cat /tmp/uvicorn.log
              echo "--- end of log ---"
              exit 1
            fi
            sleep 1
          done

      - name: Run API tests
        run: python ../test_all.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Dump server logs (on failure)
        if: failure()
        run: |
          echo "=== uvicorn log (/tmp/uvicorn.log) ==="
          cat /tmp/uvicorn.log
          echo "=== end of log ==="

      - name: Stop backend server
        if: always()
        run: pkill -f "uvicorn app.main:app" || true

  frontend-shop:
    name: Frontend Shop (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-shop

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-shop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  frontend-admin:
    name: Frontend Admin (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
